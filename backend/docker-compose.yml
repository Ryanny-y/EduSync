version: "3.9"

name: edusync

services:
  db:
    image: postgres:15
    container_name: postgres_db_edusync
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edusync
    volumes:
      - postgres_data_edusync:/var/lib/postgresql/data

volumes:
  postgres_data_edusync: